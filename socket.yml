version: 2

triggerPaths:
  - "package.json"
  - "package-lock.json"
  - "SECURITY.md"
  - "socket.yml"
  - ".github/dependabot.yml"
  - ".github/CODEOWNERS"
  - ".github/workflows/*.yml"

githubApp:
  enabled: true
  pullRequestAlertsEnabled: true
  dependencyOverviewEnabled: true
  projectReportsEnabled: true

issueRules:
  didYouMean: true
  installScripts: true
  telemetry: true
  malware: true
  hasNativeCode: true
  shellScriptOverride: true
  gitDependency: true
  httpDependency: true
  invalidPackageJSON: true
  unresolvedRequire: true
